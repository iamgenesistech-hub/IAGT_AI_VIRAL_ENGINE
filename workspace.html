<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVICS Elite Executive Workspace</title>
    <style>
      :root { color-scheme: dark; --bg:#07090f; --bg2:#0a0f1a; --panel:#0e1421; --panel2:#0c1320; --line:#20314c; --text:#ecf3ff; --muted:#8ca1c0; --sky:#42b7ff; --green:#22c07a; --red:#cf4a57; --amber:#d89d45; --gold:#d2ab58; --violet:#5d3cc8; --aura:#1a3d6d; }
      * { box-sizing:border-box; }
      body { margin:0; background:radial-gradient(circle at 15% -20%, rgba(80,46,183,0.35), transparent 40%), radial-gradient(circle at 85% 0%, rgba(46,146,214,0.25), transparent 32%), linear-gradient(180deg, var(--bg2), var(--bg)); color:var(--text); font-family:"Segoe UI", "Arial Nova", Arial, sans-serif; }
      button, input, textarea, select { font:inherit; }
      button, .button { border:1px solid var(--line); border-radius:12px; padding:10px 14px; background:linear-gradient(180deg, #131d2d, #0b1321); color:var(--text); cursor:pointer; transition:all .22s ease; }
      button:hover, .button:hover { transform:translateY(-1px); border-color:#2a4368; box-shadow:0 10px 28px rgba(19,39,66,.35); }
      button:disabled { cursor:not-allowed; opacity:.45; }
      a { color:inherit; text-decoration:none; }
      .shell { display:grid; grid-template-columns:260px minmax(0,1fr) 300px; min-height:100vh; }
      .main { min-width:0; display:flex; flex-direction:column; }
      header, footer, .tabs { border-bottom:1px solid var(--line); padding:16px; -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); }
      footer { border-top:1px solid var(--line); border-bottom:0; color:var(--muted); font-size:12px; display:flex; gap:16px; justify-content:space-between; background:rgba(5,10,18,.6); }
      h1, h2, h3, p { margin-top:0; }
      header p, .muted { color:var(--muted); }
      .note { display:none; }
      .tabs { display:grid; gap:8px; overflow:auto; padding:16px; border-right:1px solid var(--line); background:linear-gradient(180deg, rgba(10,18,30,.94), rgba(8,14,24,.82)); }
      .tabs button { border-radius:12px; background:linear-gradient(180deg, rgba(18,31,49,.65), rgba(11,20,34,.65)); color:var(--muted); white-space:nowrap; text-align:left; }
      .tabs button.active { color:var(--text); border-color:rgba(210,171,88,.75); box-shadow:inset 3px 0 0 var(--gold), 0 8px 20px rgba(13,25,42,.5); }
      .content { flex:1; padding:20px; }
      .rail { border-left:1px solid var(--line); background:linear-gradient(180deg, rgba(8,14,24,.94), rgba(10,18,30,.85)); padding:16px; }
      .card, .field, .empty { border:1px solid var(--line); border-radius:14px; background:linear-gradient(180deg, rgba(15,23,36,.9), rgba(11,18,29,.92)); padding:14px; box-shadow:0 14px 30px rgba(6,11,18,.45); }
      .stack { display:grid; gap:12px; }
      .grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); }
      .split { display:grid; gap:14px; grid-template-columns:1fr 1fr; align-items:start; }
      .row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
      .between { justify-content:space-between; }
      .top-links { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
      .top-links a { border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:rgba(8,15,24,.8); color:var(--text); font-size:13px; }
      label span { display:block; margin-bottom:6px; color:var(--muted); font-size:13px; }
      input, textarea, select { width:100%; border:1px solid var(--line); border-radius:10px; background:#080f1b; color:var(--text); padding:10px; }
      textarea { min-height:220px; resize:vertical; }
      .primary { background:linear-gradient(180deg, #2e8fcc, #1f5f9f); }
      .success { background:linear-gradient(180deg, #2fa268, #1f734a); }
      .danger { background:linear-gradient(180deg, #cf4a57, #a43a45); }
      .warning { background:linear-gradient(180deg, #d9a55c, #b98133); }
      .pill { display:inline-flex; border:1px solid var(--line); border-radius:999px; padding:4px 8px; color:var(--muted); font-size:12px; }
      video { width:100%; max-height:520px; border:1px solid var(--line); border-radius:12px; background:#000; }
      .metric { cursor:pointer; text-align:left; }
      .metric strong { display:block; margin-top:6px; font-size:28px; color:#fff; letter-spacing:.02em; }
      .finding.critical { border-color:#7f1d1d; }
      .finding.warning { border-color:#92400e; }
      .drawer { position:fixed; inset:0; background:rgba(0,0,0,.62); display:none; }
      .drawer.open { display:block; }
      .drawer-panel { margin-left:auto; height:100%; max-width:440px; background:#030712; border-left:1px solid var(--line); padding:16px; overflow:auto; }
      .top-executive { display:flex; justify-content:space-between; gap:12px; align-items:center; }
      .power-pyramid { width:42px; height:42px; clip-path:polygon(50% 0, 0 100%, 100% 100%); border:1px solid rgba(210,171,88,.8); background:linear-gradient(180deg, #1d2638, #0c121f); box-shadow:0 0 0 1px rgba(66,183,255,.15), 0 10px 24px rgba(3,8,15,.55); position:relative; }
      .power-pyramid::after { content:""; position:absolute; inset:6px 9px 10px; clip-path:polygon(50% 0, 0 100%, 100% 100%); background:linear-gradient(180deg, rgba(66,183,255,.8), rgba(66,183,255,.1)); opacity:.22; transition:opacity .3s ease; }
      .dna-capsule { border:1px solid rgba(210,171,88,.5); border-radius:999px; padding:8px 12px; min-width:146px; background:linear-gradient(180deg, rgba(16,27,42,.82), rgba(10,18,30,.82)); display:flex; gap:10px; align-items:center; justify-content:center; }
      .dna { width:16px; height:16px; border-radius:999px; background:radial-gradient(circle at 35% 35%, #7bd1ff, #2e8fcc 45%, #1f3556 70%); box-shadow:0 0 14px rgba(66,183,255,.6); animation:spin 8s linear infinite; animation-play-state:paused; }
      .dna-bar { width:56px; height:4px; border-radius:999px; background:linear-gradient(90deg, rgba(66,183,255,.9), rgba(210,171,88,.9)); position:relative; overflow:hidden; }
      .dna-bar::after { content:""; position:absolute; width:22px; inset:0 auto 0 -22px; background:linear-gradient(90deg, transparent, rgba(255,255,255,.7), transparent); animation:scan 1.8s linear infinite; animation-play-state:paused; }
      .timeframes { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
      .timeframes button { padding:7px 10px; border-radius:999px; font-size:12px; }
      .timeframes button.active { border-color:rgba(210,171,88,.8); color:#ffe9b8; }
      .line-meter { height:110px; border-radius:12px; border:1px solid var(--line); background:linear-gradient(180deg, rgba(10,20,35,.9), rgba(9,15,24,.8)); position:relative; overflow:hidden; }
      .line-meter::before { content:""; position:absolute; inset:18px 10px; background:linear-gradient(180deg, transparent 48%, rgba(66,183,255,.2) 50%, transparent 52%); }
      .line-meter::after { content:""; position:absolute; left:-10%; right:-10%; top:24%; height:52%; border-top:2px solid rgba(66,183,255,.8); border-radius:50%; animation:telemetry 4.5s ease-in-out infinite; animation-play-state:paused; }
      .orchestration-feed { max-height:260px; overflow:auto; }
      .manual-pre { max-height:70vh; overflow:auto; white-space:pre-wrap; border:1px solid var(--line); border-radius:12px; padding:12px; background:rgba(6,11,19,.86); font-family:Consolas, "Cascadia Code", monospace; font-size:13px; line-height:1.45; }
      .render-studio video { max-height:420px; }
      .heatmap-grid { display:grid; grid-template-columns:repeat(5, minmax(64px, 1fr)); gap:8px; }
      .heatmap-cell { border:1px solid var(--line); border-radius:10px; min-height:54px; display:grid; place-items:center; font-size:12px; color:#dce7ff; background:linear-gradient(180deg, rgba(16,29,49,.85), rgba(10,18,30,.85)); }
      .heatmap-cell.hot { background:linear-gradient(180deg, rgba(66,183,255,.25), rgba(210,171,88,.2)); border-color:rgba(210,171,88,.7); }
      .drill-selects { display:grid; gap:10px; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); }
      .forge-board { display:grid; gap:12px; grid-template-columns:repeat(4,minmax(150px,1fr)); }
      .forge-lane { min-height:180px; border:1px solid var(--line); border-radius:12px; padding:10px; background:linear-gradient(180deg, rgba(10,20,35,.9), rgba(8,14,25,.86)); }
      .forge-lane h4 { margin:0 0 8px; color:#c9dbff; }
      .forge-card { border:1px solid #2a4368; border-radius:10px; padding:8px; margin-bottom:8px; background:linear-gradient(180deg, rgba(21,35,56,.9), rgba(12,21,35,.95)); cursor:grab; }
      .forge-card:active { cursor:grabbing; }
      .vp-launcher { position:fixed; left:24px; top:140px; z-index:70; width:58px; height:58px; border-radius:999px; border:1px solid rgba(66,183,255,.65); background:linear-gradient(180deg, #173458, #0c1a30); color:#e7f2ff; font-weight:700; letter-spacing:.04em; box-shadow:0 14px 36px rgba(3,11,24,.55); cursor:grab; -webkit-user-select:none; user-select:none; }
      .vp-launcher:active { cursor:grabbing; }
      .vp-terminal { position:fixed; right:18px; bottom:18px; z-index:69; width:min(94vw, 420px); border:1px solid var(--line); border-radius:14px; padding:14px; background:linear-gradient(180deg, rgba(10,18,30,.97), rgba(7,13,24,.97)); box-shadow:0 22px 46px rgba(3,8,15,.65); display:none; }
      .vp-terminal.open { display:grid; gap:10px; }
      .vp-terminal textarea { min-height:90px; }
      .vp-terminal .hint { font-size:12px; color:var(--muted); }
      .vp-voice-status { border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:rgba(8,15,24,.72); font-size:12px; color:var(--muted); }
      .vp-voice-status.listening { border-color:rgba(66,183,255,.7); color:#d8edff; }
      .vp-voice-error { color:#ffb4be; font-size:12px; }
      .app-grid { display:grid; gap:10px; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); }
      .app-tile { border:1px solid var(--line); border-radius:12px; padding:10px; background:linear-gradient(180deg, rgba(16,27,42,.8), rgba(10,18,30,.86)); }
      .app-tile .pill { margin-top:8px; }
      .app-actions { display:flex; gap:8px; margin-top:8px; }
      .embed-frame { width:100%; min-height:420px; border:1px solid var(--line); border-radius:12px; background:#050a12; }
      .ver-sliders { display:grid; gap:10px; }
      .ver-sliders label { border:1px solid var(--line); border-radius:10px; padding:10px; background:rgba(8,15,24,.72); }
      .ver-sliders input[type="range"] { padding:0; }
      body.power-on .dna, body.power-on .dna-bar::after, body.power-on .line-meter::after { animation-play-state:running; }
      body.power-on .power-pyramid::after { opacity:.8; }
      body.power-off .card, body.power-off .tabs button { filter:saturate(.56); }
      @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
      @keyframes scan { from { transform:translateX(0); } to { transform:translateX(80px); } }
      @keyframes telemetry { 0% { transform:translateX(-10%) scaleY(0.8); } 50% { transform:translateX(8%) scaleY(1.1); } 100% { transform:translateX(-10%) scaleY(0.8); } }
      @media (max-width: 1280px) { .shell { grid-template-columns:220px minmax(0,1fr); } .rail { grid-column:1 / -1; border-left:0; border-top:1px solid var(--line); } }
      @media (max-width: 980px) { .shell, .split { grid-template-columns:1fr; } .tabs { border-right:0; border-top:1px solid var(--line); } .top-executive { align-items:flex-start; } }
    </style>
  </head>
  <body>
    <main class="shell">
      <nav class="tabs" id="tabs" aria-label="EVICS Workspaces"></nav>
      <section class="main">
        <header>
          <div class="top-executive">
            <div class="row">
              <button class="power-pyramid" data-power-toggle title="Master Power"></button>
              <div>
                <h1>EVICS Command Center</h1>
                <p>Unified enterprise operations workspace.</p>
              </div>
            </div>
            <div class="dna-capsule">
              <div class="dna"></div>
              <div class="dna-bar"></div>
              <span id="dna-status">Dormant</span>

          </div>
          <div class="row between">
            <div class="top-links" aria-label="EVICS navigation">

      <aside class="rail" id="rail"></aside>
    </main>
    <div class="drawer" id="drawer"><div class="drawer-panel"><div class="row between"><h2>Workspace Logs</h2><button data-close-logs>Close</button></div><div id="logs"></div></div></div>
    <button id="vp-launcher" class="vp-launcher" type="button" title="VP command terminal launcher">VP</button>
    <section id="vp-terminal" class="vp-terminal" aria-label="VP command terminal"></section>

    <script>
      const stages = ["command", "signal_intelligence", "campaign_forge", "product_intelligence", "discovery_grid", "brand_compliance", "pipeline_queue", "render_briefs", "brand_settings", "api_connections", "viral_dynamics", "market_heatmaps", "creator_intelligence", "semantic_memory", "autonomous_ops", "strategic_forecasting", "executive_boardroom", "intelligence_lab", "media_library", "agent_performance", "platform_status", "system_core"];
      const labels = {
        command:"Executive Nexus",
        signal_intelligence:"Signal Intelligence",
        campaign_forge:"Campaign Forge",
        product_intelligence:"Product Intelligence",
        discovery_grid:"Live Discovery Grid",
        brand_compliance:"Brand Compliance",
        pipeline_queue:"Pipeline Drafts",
        render_briefs:"Render Briefs",
        brand_settings:"Brand Settings",
        api_connections:"API Connections",
        viral_dynamics:"Viral Dynamics",
        market_heatmaps:"Market Heatmaps",
        creator_intelligence:"Creator Intelligence",
        semantic_memory:"Semantic Memory",
        autonomous_ops:"Autonomous Ops",
        strategic_forecasting:"Strategic Forecasting",
        executive_boardroom:"Executive Boardroom",
        intelligence_lab:"Intelligence Lab",
        media_library:"Media Library",
        agent_performance:"Agent Performance",
        platform_status:"Platform Status",
        system_core:"System Core",
        admin_manual:"Admin Manual"
      };
      const stageAliases = { command:"command", scanners:"signal_intelligence", media:"campaign_forge", products:"product_intelligence", decisions:"executive_boardroom", evidence:"intelligence_lab", insights:"strategic_forecasting", discovery:"discovery_grid", compliance:"brand_compliance", queue:"pipeline_queue", export:"render_briefs", settings:"brand_settings", connections:"api_connections", library:"media_library", agents:"agent_performance", platforms:"platform_status" };
      const workflowStageSet = ["command", "campaign_forge", "product_intelligence", "signal_intelligence", "executive_boardroom", "intelligence_lab"];
      const fullStageSet = ["command", "signal_intelligence", "campaign_forge", "product_intelligence", "discovery_grid", "brand_compliance", "pipeline_queue", "render_briefs", "brand_settings", "api_connections", "viral_dynamics", "market_heatmaps", "creator_intelligence", "semantic_memory", "autonomous_ops", "strategic_forecasting", "executive_boardroom", "intelligence_lab", "system_core"];
      const adminStageSet = ["command", "campaign_forge", "product_intelligence", "executive_boardroom"];
      const ADMIN_MANUAL_FALLBACK_TEXT = `EVICS Marketing Engine - Admin and Owner Training Manual

    Version: 2026-06-22
    Audience: Admin, Owner, Executive Operator

    1) Executive Workflow Order
    - Executive Nexus
    - Campaign Forge
    - Product Intelligence
    - Signal Intelligence
    - Executive Boardroom
    - Intelligence Lab

    2) Executive Nexus (Shift Start)
    - Confirm Master Power is active.
    - Refresh streams.
    - Run Executive Scan.
    - Review KPI anomalies.
    - Route next actions into Campaign Forge.

    3) Campaign Forge (Build + Render)
    - Create draft title and script.
    - Attach source viral URL.
    - Send to render.
    - Attach provider output and move to board review.

    4) Product Intelligence (Viral Signals)
    - Start VP-assist or continuous scan.
    - Review top products and platform leaderboard.
    - Feed winning patterns back into script and creative strategy.

    5) Signal Intelligence (Scanner Digest)
    - Control scanner enabled/disabled state.
    - Configure interval and duration.
    - Run scan and review digest metrics.
    - Use High/Medium/Low and Top Scanner Themes to decide holds.

    6) Executive Boardroom (Governance)
    - Compare source vs render.
    - Approve, rework, hold, or publish.
    - Confirm no scanner/governance block before publish.

    7) Intelligence Lab (Evidence)
    - Verify pipeline records.
    - Verify source/render proof links.
    - Verify timeline events and publish traceability.

    8) VP Terminal
    - Run directives for mission automation.
    - Use unlock/lock ops mode intentionally.
    - Use mission refresh and board open controls.

    9) Daily Admin Playbook
    Morning:
    - Refresh + run scan.
    - Check digest and resolve high severity issues.
    - Process campaign queue and board decisions.

    Midday:
    - Re-run scan and clear blockers.

    Closeout:
    - Publish approved assets.
    - Confirm evidence completeness.

    10) Operator Standards
    - Publish from evidence, not intuition.
    - Keep decisions traceable.
    - Follow workflow order consistently.
    - Escalate repeated recurring risk themes.

    End of in-app manual. Full markdown manual is also stored in repository as EVICS_ADMIN_OWNER_TRAINING_MANUAL.md.`;
      const timeframeOptions = ["live", "hourly", "daily", "weekly", "monthly", "quarterly", "yearly", "lifetime"];
      const autonomyModes = ["Manual", "Assisted", "Autonomous", "Aggressive Autonomous", "Experimental AI"];
      const heatmapModel = {
        regions: ["North America", "Europe", "MENA", "LATAM", "APAC"],
        platforms: ["TikTok", "Meta", "YouTube", "Google", "Pinterest"],
        creators: ["Performance UGC", "Lifestyle Macro", "Authority Niche", "Micro Burst", "Founder Voice"],
        narratives: ["Pain to Proof", "Ritual Stack", "Transformation", "Authority Demo", "Scarcity Spike"],
        products: ["Sea Moss Capsules", "Collagen Matrix", "Nootropic Stack", "Recovery Blend", "Hydration Core"]
      };
      const transitions = { draft:["queued"], queued:["rendering"], rendering:["review_pending","render_failed"], render_failed:["queued"], review_pending:["approved","rework_requested","discarded"], approved:["published"], rework_requested:["queued"], discarded:[], published:[] };
      const state = loadState();
      const runtime = { pollers:{}, monitorInterval:null, vpMissionInterval:null, productScanInterval:null, vpDrag:null, vpRecognition:null };

      function visibleStages() {
        return state.opsUnlocked ? fullStageSet : workflowStageSet;
      }

      function loadState() {
        const base = {
          assets:[],
          selectedAssetId:"",
          activeStage:"command",
          logs:[],
          scanner:{ enabled:true, status:"ready", findings:[], intervalMinutes:60, durationSeconds:45 },
          systemPower:true,
          timeframe:"live",
          autoplayRenders:true,
          campaign:{ autonomyMode:"Autonomous", budgetVelocity:62, automationLevel:74, showMediaStudio:false },
          verLastSyncedAt:"",
          verProfile:{
            category:"Sea Moss Capsules",
            threshold:58,
            semanticWeight:66,
            accelerationWeight:72,
            volatilitySensitivity:44,
            creatorTrustWeight:61,
            engagementNormalization:69
          },
          heatmap:{ region:"North America", platform:"TikTok", creator:"Performance UGC", narrative:"Pain to Proof", product:"Sea Moss Capsules" },
          creatorEmbed:{ app:"", url:"" },
          renderJobs:{},
          productCatalog:[],
          productCatalogLoadedAt:"",
          pipelineRuns:{},
          opsUnlocked: false,
          vpLauncher: { x:24, y:140 },
          vpTerminalOpen: false,
          vpMission: null,
          vpVoice: {
            supported: Boolean(window.SpeechRecognition || window.webkitSpeechRecognition),
            listening: false,
            lastTranscript: '',
            lastResponse: 'Voice mode ready.',
            error: ''
          },
          productScan: { running: false, mode: 'off', progressLog: [], boardSummary: null, lastRefreshedAt: '' },
          live:{ systemStatus:null, mediaState:null, brandProfile:null, timeline:[], lastSyncAt:"", syncError:"" }
        };
        try {
          const persisted = JSON.parse(localStorage.getItem("evics-elite-workspace") || "{}");
          return {
            ...base,
            ...persisted,
            opsUnlocked: Boolean(base.opsUnlocked),
            vpLauncher: {
              x: Number(persisted.vpLauncher?.x || base.vpLauncher.x),
              y: Number(persisted.vpLauncher?.y || base.vpLauncher.y)
            },
            vpTerminalOpen: false,
            vpMission: persisted.vpMission || null,
            vpVoice: {
              ...base.vpVoice,
              listening: false,
              error: '',
              lastTranscript: ''
            },
            productScan: { running: false, mode: 'off', progressLog: [], boardSummary: null, lastRefreshedAt: '' },
            scanner:{ ...base.scanner, ...(persisted.scanner || {}) },
            live:base.live
          };
        } catch {
          return base;
        }
      }

      function ensureVpRecognition() {
        if (runtime.vpRecognition) return runtime.vpRecognition;
        const SpeechRecognitionApi = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognitionApi) {
          state.vpVoice.supported = false;
          return null;
        }
        const recognition = new SpeechRecognitionApi();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
          state.vpVoice.listening = true;
          state.vpVoice.error = '';
          state.vpVoice.lastResponse = 'Listening for VP directive...';
          renderVpTerminal();
        };

        recognition.onend = () => {
          state.vpVoice.listening = false;
          renderVpTerminal();
        };

        recognition.onerror = (event) => {
          state.vpVoice.listening = false;
          state.vpVoice.error = event?.error === 'no-speech'
            ? 'No speech detected. Try again or use typed directives.'
            : 'Voice mode error: ' + String(event?.error || 'unknown');
          renderVpTerminal();
        };

        recognition.onresult = (event) => {
          const transcript = String(event?.results?.[0]?.[0]?.transcript || '').trim();
          if (!transcript) {
            state.vpVoice.error = 'No directive captured. Please try again.';
            renderVpTerminal();
            return;
          }
          state.vpVoice.lastTranscript = transcript;
          state.vpVoice.lastResponse = 'Executing voice directive: ' + transcript;
          state.vpVoice.error = '';
          renderVpTerminal();
          runVpDirective(transcript);
        };

        runtime.vpRecognition = recognition;
        return recognition;
      }

      function toggleVpVoiceCapture() {
        const recognition = ensureVpRecognition();
        if (!recognition) {
          state.vpVoice.error = 'Voice recognition is unavailable in this browser. Use typed directives.';
          renderVpTerminal();
          return;
        }
        if (state.vpVoice.listening) {
          recognition.stop();
          return;
        }
        state.vpVoice.error = '';
        recognition.start();
      }
      function save() {
        const persistable = {
          assets: state.assets,
          selectedAssetId: state.selectedAssetId,
          activeStage: state.activeStage,
          logs: state.logs,
          scanner: state.scanner,
          renderJobs: state.renderJobs,
          productCatalog: state.productCatalog,
          productCatalogLoadedAt: state.productCatalogLoadedAt,
          pipelineRuns: state.pipelineRuns,
          vpMission: state.vpMission,
          systemPower: state.systemPower,
          timeframe: state.timeframe,

        area.value = value;
        area.setAttribute('readonly', 'readonly');
        area.style.position = 'fixed';
        area.style.left = '-9999px';
        document.body.appendChild(area);
        area.select();
        document.execCommand('copy');

      function runVpDirective(command) {
        const normalized = String(command || '').trim().toLowerCase();
        if (!normalized) return;
        state.vpVoice.lastTranscript = String(command || '').trim();

        const renderPublishMatch = normalized.match(/render\s+and\s+publish\s+(\d+)/i) || normalized.match(/publish\s+(\d+)\s+videos?/i);
        if (renderPublishMatch) {
          const requestedCount = Math.max(1, Math.min(Number(renderPublishMatch[1] || 1), 12));
          state.vpVoice.lastResponse = 'Launching mission for ' + requestedCount + ' videos.';
          state.vpTerminalOpen = true;
          log('VP mission requested: render and publish ' + requestedCount + ' videos.', 'info');
          save();
          fetch('/api/agents/vp-mission', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify({ targetCount: requestedCount, originSectionId: 'vp-terminal' })
          })
            .then((response) => response.json())
            .then((payload) => {
              if (!payload?.success || !payload.mission) {
                throw new Error(payload?.error || 'VP mission start failed.');
              }
              state.vpMission = payload.mission;
              log('VP mission started: ' + payload.mission.missionId + '.', 'info');
              save();
              render();
            })
            .catch((error) => {
              log('VP mission failed to start: ' + error.message, 'error');
              render();
            });
          return;
        }

        if (normalized.includes('unlock ops') || normalized.includes('enable ops')) {
          state.vpVoice.lastResponse = 'Ops mode unlocked.';
          state.opsUnlocked = true;
          state.vpTerminalOpen = true;
          state.activeStage = 'signal_intelligence';
          log('VP terminal unlocked ops mode. Board and diagnostics workspaces are now accessible.', 'info');
          save();
          render();
          return;
        }

        if (normalized.includes('lock ops') || normalized.includes('admin focus')) {
          state.vpVoice.lastResponse = 'Ops mode locked to admin focus.';
          state.opsUnlocked = false;
          state.activeStage = 'command';
          log('VP terminal set admin focus mode. Hidden ops workspaces were concealed.', 'info');
          save();
          render();
          return;
        }

        if (normalized.includes('open board')) {
          state.vpVoice.lastResponse = 'Opening executive boardroom.';
          if (!state.opsUnlocked) state.opsUnlocked = true;
          state.activeStage = 'executive_boardroom';
          state.vpTerminalOpen = true;
          log('VP terminal opened executive boardroom controls.', 'info');
          save();
          render();
          return;
        }

        if (normalized.includes('run scan') || normalized.includes('scanner')) {
          state.vpVoice.lastResponse = 'Running executive scanner now.';
          if (!state.opsUnlocked) state.opsUnlocked = true;
          state.activeStage = 'signal_intelligence';
          state.vpTerminalOpen = true;
          runScanners();
          return;
        }

        // Product viral scan directives
        if (normalized.includes('find viral') || (normalized.includes('scan') && normalized.includes('product'))) {
          const scanMode = normalized.includes('continuous') ? 'continuous' : 'vp-assist';
          state.vpVoice.lastResponse = 'Starting product scan in ' + scanMode + ' mode.';
          state.activeStage = 'product_intelligence';
          state.vpTerminalOpen = false;
          log('VP directive: starting product viral scan in ' + scanMode + ' mode.', 'info');
          save();
          render();
          startProductScanFromUI(scanMode);
          return;
        }

        if (normalized.includes('stop scan') || normalized.includes('scan off') || normalized.includes('turn off scan')) {
          state.vpVoice.lastResponse = 'Stopping product scan.';
          log('VP directive: stopping product viral scan.', 'info');
          stopProductScanFromUI();
          return;
        }

        if (normalized.includes('vp assist') || normalized.includes('vp-assist')) {
          state.vpVoice.lastResponse = 'Starting VP-assist scan workflow.';
          state.activeStage = 'product_intelligence';
          state.vpTerminalOpen = false;
          log('VP-assist mode: scanning each product for viral formats until complete.', 'info');
          save();
          render();
          startProductScanFromUI('vp-assist');
          return;
        }

        if (normalized.includes('open product') || normalized.includes('product intelligence')) {
          state.vpVoice.lastResponse = 'Opening product intelligence workspace.';
          state.activeStage = 'product_intelligence';
          state.vpTerminalOpen = false;
          log('VP terminal opened Product Intelligence workspace.', 'info');
          save();
          render();
          return;
        }


        if (normalized.includes('open media')) {
          state.vpVoice.lastResponse = 'Opening campaign forge workspace.';
          state.activeStage = 'campaign_forge';
          state.vpTerminalOpen = true;
          log('VP terminal opened campaign forge.', 'info');
          save();
          render();
          return;
        }

        state.vpVoice.lastResponse = 'Directive heard but no route matched.';
        log('VP terminal accepted the directive but no route matched. Try: unlock ops mode, open board, run scan, admin focus.', 'warning');
      }

          '<p class="note">Left navigation now stays workflow-first so your team can track execution from beginning to end.</p>';

        const advancedCard = document.createElement('div');
        advancedCard.className = 'card';
        advancedCard.innerHTML =
          '<h3>Advanced Workspaces (Moved Here at Bottom)</h3>' +
          '<p class="note">These were removed from the left side to reduce confusion. Use only when needed.' + (state.opsUnlocked ? '' : ' Unlock Ops in VP terminal to open them.') + '</p>' +
          '<div class="grid">' +
            '<button data-stage="media_library">Media Library (Renders)</button>' +
            '<button data-stage="agent_performance">Agent Performance Tracking</button>' +
            '<button data-stage="platform_status">Platform Status (Publishing)</button>' +
            '<button data-stage="discovery_grid">Live Discovery Grid</button>' +
            '<button data-stage="brand_compliance">Brand Compliance</button>' +
            '<button data-stage="pipeline_queue">Pipeline Drafts</button>' +
            '<button data-stage="render_briefs">Render Briefs</button>' +
            '<button data-stage="brand_settings">Brand Settings</button>' +
            '<button data-stage="api_connections">API Connections</button>' +
            '<button data-stage="viral_dynamics">Viral Dynamics (VER tuning)</button>' +
            '<button data-stage="market_heatmaps">Market Heatmaps (region/platform drilldown)</button>' +
            '<button data-stage="creator_intelligence">Creator Intelligence (apps + prompts)</button>' +
            '<button data-stage="semantic_memory">Semantic Memory (patterns/memory)</button>' +
            '<button data-stage="autonomous_ops">Autonomous Ops (agent orchestration)</button>' +
            '<button data-stage="strategic_forecasting">Strategic Forecasting (forecast model)</button>' +
            '<button data-stage="system_core">System Core (runtime internals)</button>' +
          '</div>';

        const trainingCard = document.createElement('div');
        trainingCard.className = 'card';
        trainingCard.innerHTML =
          '<h3>Button Training Guide</h3>' +
          '<p><b>Master Power:</b> toggles command center runtime mode and visual pulse state.</p>' +
          '<p><b>Run Executive Scan:</b> launches scanner checks for risk and readiness.</p>' +
          '<p><b>Refresh Streams:</b> reloads telemetry, pipeline stats, and mission state.</p>' +
          '<p><b>VP button:</b> opens VP voice/text terminal for mission directives.</p>' +
          '<p><b>Workflow map buttons:</b> move through each pipeline stage in order.</p>' +
          '<div class="row"><button class="primary" data-stage="admin_manual">View Admin Manual</button><button class="success" data-open-training>&#9654; Watch Training</button></div>';

        stack.appendChild(workflowCard);
        stack.appendChild(advancedCard);
        stack.appendChild(trainingCard);
      }

      function render() {
        state.activeStage = normalizeStage(state.activeStage || 'command');
        renderTabs(); renderTimeframes(); renderRail(); renderStatus(); renderLogs(); applyPowerState();
        const map = {
          command: state.opsUnlocked ? renderCommand : renderCommandAdmin,
          signal_intelligence:renderScanners,
          campaign_forge:renderCampaignForge,
          product_intelligence:renderProductIntelligence,
          discovery_grid:renderDiscoveryGrid,
          brand_compliance:renderComplianceCenter,
          pipeline_queue:renderPipelineQueue,
          render_briefs:renderRenderBriefsCenter,
          brand_settings:renderBrandSettingsCenter,
          api_connections:renderApiConnectionsCenter,
          viral_dynamics:renderViralDynamics,
          market_heatmaps:renderMarketHeatmaps,
          creator_intelligence:renderCreatorIntelligence,
          semantic_memory:() => renderWorkspaceBrief('semantic_memory'),
          autonomous_ops:() => renderWorkspaceBrief('autonomous_ops'),
          strategic_forecasting:renderInsights,
          executive_boardroom:renderBoardroomDecisions,
          intelligence_lab:renderEvidence,
          media_library:renderMediaLibrary,
          agent_performance:renderAgentPerformance,
          platform_status:renderPlatformStatus,
          system_core:() => renderWorkspaceBrief('system_core'),
          admin_manual:renderAdminManual,
          scanners:renderScanners,
          media:renderMedia,
          decisions:renderDecisions,
          evidence:renderEvidence,
          insights:renderInsights
        };
        const allowed = visibleStages();
        if (!state.opsUnlocked && !allowed.includes(state.activeStage)) {
          state.activeStage = "command";
        }
        document.getElementById("content").innerHTML = (map[state.activeStage] || renderCommand)();
        renderCommandBottomSections();
        loadAdminManualDocument();
        renderVpTerminal();
        bind();
      }
      async function loadAdminManualDocument() {
        const container = document.getElementById('admin-manual-content');
        if (!container) return;
        container.textContent = ADMIN_MANUAL_FALLBACK_TEXT;
      }
      function openTrainingVideo() {
        window.open('/evics-training', '_blank', 'width=1100,height=760,resizable=yes,scrollbars=yes,toolbar=no,menubar=no,location=no,status=no');
      }
      function downloadAdminManualText() {
        const blob = new Blob([ADMIN_MANUAL_FALLBACK_TEXT], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'EVICS_ADMIN_OWNER_TRAINING_MANUAL.txt';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }
      function bind() {
        document.querySelectorAll("[data-stage]").forEach((el) => el.addEventListener("click", () => setStage(el.dataset.stage)));
        document.querySelectorAll("[data-timeframe]").forEach((el) => el.addEventListener("click", () => setTimeframe(el.dataset.timeframe)));
        document.querySelectorAll("[data-power-toggle]").forEach((el) => el.addEventListener("click", togglePower));
        document.querySelectorAll("[data-run-scan]").forEach((el) => el.addEventListener("click", runScanners));
        document.querySelectorAll("[data-toggle-scanner]").forEach((el) => el.addEventListener("click", async () => {
          state.scanner.enabled = !state.scanner.enabled;
          state.scanner.status = state.scanner.enabled ? "ready" : "blocked";
          save();
          render();
          await applyScannerSettingsFromInputs();
        }));
        document.querySelectorAll("[data-refresh-monitors]").forEach((el) => el.addEventListener("click", () => refreshLiveMonitors()));
        document.querySelectorAll("[data-save-scanner-settings]").forEach((el) => el.addEventListener("click", applyScannerSettingsFromInputs));
        document.querySelectorAll("[data-retry-failed-renders]").forEach((el) => el.addEventListener("click", async () => {
          const backendFailed = (Array.isArray(state.live.mediaState?.media) ? state.live.mediaState.media : []).filter((bm) => bm.render_status === 'failed');
          if (!backendFailed.length) { log('No failed renders to retry.'); return; }
          try {
            await postJson('/api/media/action', { action: 're_queue_render', ids: backendFailed.map((bm) => bm.id) });
            await refreshLiveMonitors({ silent: true });
            log('Re-queued ' + backendFailed.length + ' failed render(s). Return to Campaign Forge to re-submit.');
          } catch (error) {
            log('Retry failed: ' + error.message, 'error');
          }
        }));
        document.querySelectorAll("[data-run-have-checks]").forEach((el) => el.addEventListener("click", async () => {
          const backendMedia = (Array.isArray(state.live.mediaState?.media) ? state.live.mediaState.media : []).filter((bm) => bm.media_type === 'video');
          if (!backendMedia.length) { log('No video assets to run H.A.V.E. gate on.'); return; }
          log('Running H.A.V.E. governance gate on ' + backendMedia.length + ' video asset(s)...');
          let passed = 0; let failed = 0;
          for (const bm of backendMedia) {
            try {
              const result = await postJson('/api/media/' + bm.id + '/have-check', {});
              if (result.haveResult?.passed) passed++; else failed++;
            } catch (error) {
              failed++;
            }
          }
          await refreshLiveMonitors({ silent: true });
          log('H.A.V.E. gate complete: ' + passed + ' passed, ' + failed + ' failed.');
          render();
        }));
        document.querySelectorAll("[data-save-draft]").forEach((el) => el.addEventListener("click", saveDraft));
        document.querySelectorAll("[data-send-render]").forEach((el) => el.addEventListener("click", sendToRender));
        document.querySelectorAll("[data-elite-render]").forEach((el) => el.addEventListener("click", runEliteRender));
        document.querySelectorAll("[data-select]").forEach((el) => el.addEventListener("click", () => { state.selectedAssetId = el.dataset.select; save(); render(); }));
        document.querySelectorAll("[data-start-render]").forEach((el) => el.addEventListener("click", () => startRender(el.dataset.startRender)));
        document.querySelectorAll("[data-complete-render]").forEach((el) => el.addEventListener("click", () => completeRender(el.dataset.completeRender)));
        document.querySelectorAll("[data-retry]").forEach((el) => el.addEventListener("click", () => { const asset = state.assets.find((a) => a.id === el.dataset.retry); if (asset) asset.stage = "queued"; save(); render(); }));
        document.querySelectorAll("[data-approve]").forEach((el) => el.addEventListener("click", () => approve(el.dataset.approve)));
        document.querySelectorAll("[data-rework]").forEach((el) => el.addEventListener("click", () => rework(el.dataset.rework)));
        document.querySelectorAll("[data-publish]").forEach((el) => el.addEventListener("click", () => publish(el.dataset.publish)));
        document.querySelectorAll("[data-open-logs]").forEach((el) => el.addEventListener("click", () => document.getElementById("drawer").classList.add("open")));
        document.querySelectorAll("[data-close-logs]").forEach((el) => el.addEventListener("click", () => document.getElementById("drawer").classList.remove("open")));
        document.querySelectorAll("[data-download-admin-manual]").forEach((el) => el.addEventListener("click", downloadAdminManualText));
        document.querySelectorAll("[data-open-training]").forEach((el) => el.addEventListener("click", openTrainingVideo));
        document.querySelectorAll("[data-copy-launch-pack]").forEach((el) => el.addEventListener("click", exportApprovedLaunchPack));
        document.querySelectorAll("[data-download-launch-pack]").forEach((el) => el.addEventListener("click", downloadApprovedLaunchPack));
        document.querySelectorAll("[data-toggle-render-autoplay]").forEach((el) => el.addEventListener("click", () => { state.autoplayRenders = !state.autoplayRenders; save(); render(); }));
        document.querySelectorAll("[data-toggle-render-mute]").forEach((el) => el.addEventListener("click", () => { const player = document.getElementById("executive-player"); if (player) player.muted = !player.muted; }));
        document.querySelectorAll("[data-render-fullscreen]").forEach((el) => el.addEventListener("click", () => { const player = document.getElementById("executive-player"); if (player?.requestFullscreen) player.requestFullscreen(); }));
        document.querySelectorAll("[data-autonomy-mode]").forEach((el) => el.addEventListener("change", () => {
          state.campaign.autonomyMode = el.value;
          save();
          log("Campaign Forge mode set to " + el.value + ".");
          render();
        }));
        document.querySelectorAll("[data-campaign-budget]").forEach((el) => el.addEventListener("input", () => {
          state.campaign.budgetVelocity = Number(el.value || 62);
          save();
          render();
        }));
        document.querySelectorAll("[data-campaign-automation]").forEach((el) => el.addEventListener("input", () => {
          state.campaign.automationLevel = Number(el.value || 74);
          save();
          render();
        }));
        document.querySelectorAll("[data-forge-optimize]").forEach((el) => el.addEventListener("click", () => {
          const score = Math.round((state.campaign.budgetVelocity * 0.48) + (state.campaign.automationLevel * 0.52));
          log("Campaign Forge optimizer completed: deployment confidence " + score + "%.", "info");
        }));
        document.querySelectorAll("[data-toggle-media-studio]").forEach((el) => el.addEventListener("click", () => {
          state.campaign.showMediaStudio = !state.campaign.showMediaStudio;
          save();
          render();
        }));
        document.querySelectorAll("[data-drag-asset]").forEach((el) => el.addEventListener("dragstart", (event) => {
          event.dataTransfer?.setData("text/asset-id", el.dataset.dragAsset || "");
        }));
        document.querySelectorAll("[data-drop-stage]").forEach((el) => {
          el.addEventListener("dragover", (event) => event.preventDefault());
          el.addEventListener("drop", (event) => {
            event.preventDefault();
            const assetId = event.dataTransfer?.getData("text/asset-id");
            const stage = el.dataset.dropStage;
            const asset = state.assets.find((item) => item.id === assetId);
            if (!asset || !stage) return;
            asset.stage = stage;
            save();
            log("Campaign Forge moved " + asset.title + " to " + stage + ".", "info");
            render();
          });
        });
        document.querySelectorAll("[data-heatmap-select]").forEach((el) => el.addEventListener("change", () => {
          const key = el.dataset.heatmapSelect;
          if (!key) return;
          state.heatmap[key] = el.value;
          save();
          render();
        }));
        document.querySelectorAll("[data-ver-category]").forEach((el) => el.addEventListener("change", () => {
          state.verProfile.category = el.value;
          save();
          render();
        }));
        document.querySelectorAll("[data-ver-input]").forEach((el) => el.addEventListener("input", () => {
          const key = el.dataset.verInput;
          if (!key) return;
          state.verProfile[key] = Number(el.value || 0);
          save();
          render();
        }));
        document.querySelectorAll("[data-apply-ver]").forEach((el) => el.addEventListener("click", async () => {
          try {
            const payload = await postJson("/api/policy/ver", state.verProfile || {});
            if (payload?.policy) state.verProfile = { ...state.verProfile, ...payload.policy };
            state.verLastSyncedAt = payload?.policy?.updatedAt || payload?.updatedAt || new Date().toISOString();
            log("VER profile applied for " + state.verProfile.category + " and wired to backend decision gates.", "info");
            await refreshLiveMonitors({ silent:true });
            render();
          } catch (error) {
            log("VER policy update failed: " + error.message, "error");
          }
        }));
        document.querySelectorAll("[data-app-embed]").forEach((el) => el.addEventListener("click", () => {
          state.creatorEmbed = { app: el.dataset.appEmbed || "App", url: el.dataset.appUrl || "" };
          save();
          render();
        }));
        document.querySelectorAll("[data-clear-embed]").forEach((el) => el.addEventListener("click", () => {
          state.creatorEmbed = { app:"", url:"" };
          save();
          render();
        }));
        document.querySelectorAll("[data-prompt-save]").forEach((el) => el.addEventListener("click", () => log("Prompt saved to executive prompt vault.", "info")));
        document.querySelectorAll("[data-prompt-clone]").forEach((el) => el.addEventListener("click", () => log("Prompt cloned into orchestration variants.", "info")));
        document.querySelectorAll("[data-prompt-score]").forEach((el) => el.addEventListener("click", () => {
          const score = Math.max(72, Math.round((state.verProfile.semanticWeight + state.verProfile.creatorTrustWeight + state.verProfile.engagementNormalization) / 3));
          log("Prompt scored at " + score + " for current campaign context.", "info");
        }));

        const vpLauncher = document.getElementById("vp-launcher");
        if (vpLauncher) {
          vpLauncher.onpointerdown = (event) => {
            const startX = event.clientX;
            const startY = event.clientY;
            const originX = Number(state.vpLauncher?.x || 24);
            const originY = Number(state.vpLauncher?.y || 140);
            runtime.vpDrag = { pointerId: event.pointerId, startX, startY, originX, originY, moved:false };
            vpLauncher.setPointerCapture?.(event.pointerId);
          };

          vpLauncher.onpointermove = (event) => {
            if (!runtime.vpDrag || runtime.vpDrag.pointerId !== event.pointerId) return;
            const dx = event.clientX - runtime.vpDrag.startX;
            const dy = event.clientY - runtime.vpDrag.startY;
            if (Math.abs(dx) > 4 || Math.abs(dy) > 4) runtime.vpDrag.moved = true;
            if (!runtime.vpDrag.moved) return;
            const nextX = Math.max(8, Math.min(window.innerWidth - 72, runtime.vpDrag.originX + dx));
            const nextY = Math.max(8, Math.min(window.innerHeight - 72, runtime.vpDrag.originY + dy));
            state.vpLauncher = { x: nextX, y: nextY };
            vpLauncher.style.left = nextX + "px";
            vpLauncher.style.top = nextY + "px";
          };

          vpLauncher.onpointerup = (event) => {
            if (!runtime.vpDrag || runtime.vpDrag.pointerId !== event.pointerId) return;
            const moved = runtime.vpDrag.moved;
            runtime.vpDrag = null;
            if (moved) {
              save();
              return;
            }
            state.vpTerminalOpen = !state.vpTerminalOpen;
            save();
            render();
          };
        }

        document.querySelectorAll("[data-vp-close]").forEach((el) => el.addEventListener("click", () => {
          state.vpTerminalOpen = false;
          save();
          render();
        }));
        document.querySelectorAll("[data-vp-run]").forEach((el) => el.addEventListener("click", () => {
          const input = document.querySelector("[data-vp-command]");
          runVpDirective(input?.value || "");
        }));
        document.querySelectorAll("[data-vp-voice-toggle]").forEach((el) => el.addEventListener("click", () => toggleVpVoiceCapture()));
        document.querySelectorAll("[data-vp-open-board]").forEach((el) => el.addEventListener("click", () => runVpDirective("open board")));
        document.querySelectorAll("[data-vp-toggle-ops]").forEach((el) => el.addEventListener("click", () => runVpDirective(state.opsUnlocked ? "lock ops" : "unlock ops")));
        document.querySelectorAll("[data-vp-refresh-mission]").forEach((el) => el.addEventListener("click", () => refreshVpMissionStatus(false)));
        document.querySelectorAll("[data-pi-scan-assist]").forEach((el) => el.addEventListener("click", () => startProductScanFromUI("vp-assist")));
        document.querySelectorAll("[data-pi-scan-continuous]").forEach((el) => el.addEventListener("click", () => startProductScanFromUI("continuous")));
        document.querySelectorAll("[data-pi-scan-stop]").forEach((el) => el.addEventListener("click", () => stopProductScanFromUI()));
        document.querySelectorAll("[data-pi-scan-refresh]").forEach((el) => el.addEventListener("click", () => refreshProductScanProgress(false)));
        document.querySelectorAll("[data-pi-product]").forEach((el) => el.addEventListener("click", () => { state.activeStage = "product_intelligence"; save(); render(); }));
        
        // Media Library event handlers
        document.querySelectorAll("[data-media-lib-search]").forEach((el) => el.addEventListener("click", async () => {
          const timeGrouping = document.querySelector("[data-media-lib-grouping]")?.value || "month";
          const skuFilter = document.querySelector("[data-media-lib-sku]")?.value || "";
          const statusFilter = document.querySelector("[data-media-lib-status]")?.value || "";
          const storageFilter = document.querySelector("[data-media-lib-storage]")?.value || "";
          
          log("Searching media library...");
          try {
            const response = await postJson("/api/media/library/search", {
              timeGrouping,
              skuFilter,
              statusFilter,
              storageFilter,
              startDate: "",
              endDate: ""
            });
            state.mediaLibrary = state.mediaLibrary || {};
            state.mediaLibrary.timeGrouping = timeGrouping;
            state.mediaLibrary.skuFilter = skuFilter;
            state.mediaLibrary.statusFilter = statusFilter;
            state.mediaLibrary.storageFilter = storageFilter;
            state.mediaLibrary.results = response;
            save();
            log("Found " + response.total + " renders matching your search.", "info");
            render();
          } catch (error) {
            log("Media library search failed: " + error.message, "error");
          }
        }));
        
        document.querySelectorAll("[data-media-lib-clear]").forEach((el) => el.addEventListener("click", () => {
          state.mediaLibrary = { timeGrouping: "month", skuFilter: "", statusFilter: "", storageFilter: "", results: { periods: [] } };
          save();
          render();
          log("Media library filters cleared.", "info");
        }));
        
        document.querySelectorAll("[data-media-lib-view]").forEach((el) => el.addEventListener("click", () => {
          const mediaId = el.dataset.mediaLibView;
          window.open("/api/media-output/outputs/" + encodeURIComponent(mediaId), "_blank");
        }));
        
        document.querySelectorAll("[data-media-lib-rerender]").forEach((el) => el.addEventListener("click", async () => {
          const mediaId = el.dataset.mediaLibRerender;
          log("Opening re-render interface for " + mediaId + "...");
          state.activeStage = "campaign_forge";
          state.rerenderSourceId = mediaId;
          save();
          render();
        }));
        
        document.querySelectorAll("[data-agent-perf-refresh]").forEach((el) => el.addEventListener("click", async () => {
          log("Refreshing agent performance data...");
          try {
            const result = await postJson("/api/agents/performance", {});
            state.agentPerformance = state.agentPerformance || {};
            state.agentPerformance.report = result.report;
            state.agentPerformance.lastUpdated = new Date().toISOString();
            save();
            log("Agent performance data updated: " + result.report.agents.length + " agents tracked.", "info");
            render();
          } catch (error) {
            log("Failed to fetch agent performance: " + error.message, "error");
          }
        }));
        
        document.querySelectorAll("[data-platform-status-refresh]").forEach((el) => el.addEventListener("click", async () => {
          log("Checking platform connections...");
          try {
            const result = await fetch("/api/platforms/connection-status", { headers:{ Accept:"application/json" } }).then((r) => r.json());
            state.platformStatus = state.platformStatus || {};
            state.platformStatus.report = result.report;
            state.platformStatus.lastUpdated = new Date().toISOString();
            save();
            log("Platform status updated: " + result.report.platforms.length + " platforms checked.", "info");
            render();
          } catch (error) {
            log("Failed to fetch platform status: " + error.message, "error");
          }
        }));
      }
      function escapeHtml(value) { return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
      function escapeAttr(value) { return escapeHtml(value).replace(/"/g, "&quot;"); }
      render();
      refreshLiveMonitors({ silent:true });
      refreshProductScanProgress(true);
      if (runtime.monitorInterval) clearInterval(runtime.monitorInterval);
      runtime.monitorInterval = setInterval(() => { refreshLiveMonitors({ silent:true }); }, 15000);
      if (runtime.vpMissionInterval) clearInterval(runtime.vpMissionInterval);
      runtime.vpMissionInterval = setInterval(() => { refreshVpMissionStatus(true); }, 6000);
      if (runtime.productScanInterval) clearInterval(runtime.productScanInterval);
      runtime.productScanInterval = setInterval(() => { refreshProductScanProgress(true); }, 10000);
    </script>
  </body>
</html>
