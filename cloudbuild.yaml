# cloudbuild.yaml — IAGT AI Viral Engine (EVICS)
# Google Cloud Build → Cloud Run deployment pipeline
#
# Triggered automatically when you push to your GitHub repo,
# OR manually via: gcloud builds submit
#
# Service: evics-api  |  Region: us-central1
# Image:  gcr.io/$PROJECT_ID/evics-api

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/evics-api:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/evics-api:latest'
      - '.'
    id: 'build-image'

  # Step 2: Push to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/evics-api'
    id: 'push-image'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'evics-api'
      - '--image=gcr.io/$PROJECT_ID/evics-api:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--timeout=300'
      - '--max-instances=3'
      - '--port=4175'
    id: 'deploy-cloudrun'
    waitFor: ['push-image']

# Store image in GCR
images:
  - 'gcr.io/$PROJECT_ID/evics-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/evics-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
