<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVICS Executive Command Workspace</title>
    <meta name="description" content="EVICS executive command workspace with live operational monitors." />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="media-output.css" />
  </head>
  <body class="exec-shell-body">
    <header class="exec-shell-header">
      <div class="exec-shell-brand">
        <span class="exec-mark">EVICS</span>
        <div>
          <strong>I AM GENESIS TECH</strong>
          <small>ELITE VIRAL INTELLIGENCE CONTROL SYSTEM</small>
        </div>
      </div>
      <nav class="exec-shell-nav">
        <a href="/workspace" aria-current="page">EVICS</a>
        <a href="/affiliate">Affiliate Hub</a>
        <a href="/phone-app">Phone App</a>
        <a href="/admin-hub">Affiliate AdminHub</a>
      </nav>
      <div class="exec-shell-pulse" id="evicsPulse">Initializing live monitors…</div>
    </header>

    <main class="exec-shell-main">
      <div id="app"></div>
    </main>

    <script src="config.js"></script>
    <script src="supabase.js"></script>
    <script src="media-output.js"></script>
    <script src="app.js"></script>
    <script>
      (function () {
        const pulse = document.getElementById('evicsPulse');

        async function refreshExecutiveMonitors() {
          try {
            pulse.textContent = `Live at ${new Date().toLocaleTimeString()} · Executive telemetry active`;
          } catch (error) {
            pulse.textContent = 'Monitor sync degraded';
          }
        }

        async function bootstrapMediaProof() {
          try { document.body.classList.add('titanium-ui'); } catch (e) {}
          function ready() {
            try {
              if (window.loadMediaOutputs) {
                window.loadMediaOutputs();
                setTimeout(function () {
                  try {
                    const proofId = 'proof-evics-sea-moss';
                    if (window.mocState && window.mocState.items && window.mocState.items.length) {
                      const found = window.mocState.items.find(function (i) {
                        return i && (i.id === proofId || (i.title && i.title.indexOf('Sea Moss') !== -1));
                      });
                      if (found) {
                        window.mocState.selectedId = found.id;
                        window.render();
                      }
                    }
                  } catch (e) {}
                }, 600);
              }
            } catch (e) {}
          }
          if (document.readyState === 'complete' || document.readyState === 'interactive') ready();
          else window.addEventListener('DOMContentLoaded', ready);
        }

        bootstrapMediaProof();
        refreshExecutiveMonitors();
        setInterval(refreshExecutiveMonitors, 30000);
      })();
    </script>
  </body>
</html>
